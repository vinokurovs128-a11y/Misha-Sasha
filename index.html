<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Саши и Миши · P2P доставка</title>

    <!-- PeerJS для прямого соединения -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0b0e;
            color: #f0f0f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #0b0b0e 90%);
        }
        .app {
            max-width: 640px;
            width: 100%;
            background: rgba(20, 20, 30, 0.55);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .brand-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #ff6b9d, #c084fc, #60a5fa);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 8px 24px rgba(192, 132, 252, 0.3);
        }
        .brand h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f9d976, #f39f86, #df8cba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand .online-status {
            font-weight: 400;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.35);
            margin-left: auto;
            background: rgba(255, 255, 255, 0.04);
            padding: 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot-online { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; animation: pulse 2s infinite; }
        .dot-offline { width: 8px; height: 8px; border-radius: 50%; background: #f87171; display: inline-block; }
        .dot-connecting { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.6; transform: scale(0.9); }
        }

        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0 10px;
        }
        .login-screen .subtitle {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }
        .login-screen .avatar-select {
            display: flex;
            gap: 30px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .login-screen .avatar-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            opacity: 0.5;
            filter: grayscale(0.6);
        }
        .login-screen .avatar-option.active {
            opacity: 1;
            filter: grayscale(0);
            transform: scale(1.05);
        }
        .login-screen .avatar-option .circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: rgba(255,255,255,0.05);
            border: 3px solid transparent;
            transition: border 0.3s, box-shadow 0.3s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .login-screen .avatar-option.active .circle {
            border-color: #c084fc;
            box-shadow: 0 0 30px rgba(192, 132, 252, 0.3);
        }
        .login-screen .avatar-option .label {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
        }
        .login-screen .avatar-option.active .label { color: #fff; }
        .login-form {
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 8px;
        }
        .login-form input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 14px 22px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: #f0f0f5;
            outline: none;
            transition: border 0.2s, background 0.2s;
        }
        .login-form input:focus {
            border-color: rgba(192, 132, 252, 0.4);
            background: rgba(255, 255, 255, 0.07);
        }
        .login-form input::placeholder { color: rgba(255, 255, 255, 0.2); }
        .btn-primary {
            background: linear-gradient(145deg, #c084fc, #8b5cf6);
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 18px;
            padding: 16px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 28px rgba(139, 92, 246, 0.35);
            font-family: 'Inter', sans-serif;
            width: 100%;
            margin-top: 6px;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(139, 92, 246, 0.5);
            background: linear-gradient(145deg, #d8b4fe, #a78bfa);
        }
        .login-hint {
            margin-top: 18px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.02);
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px dashed rgba(255, 255, 255, 0.04);
        }
        .feed { display: none; animation: fadeUp 0.5s ease; }
        .feed.show { display: block; }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(18px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feed-header .user-block {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .feed-header .user-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .feed-header .user-name {
            font-weight: 600;
            font-size: 20px;
            line-height: 1.2;
        }
        .feed-header .user-name small {
            font-weight: 400;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            display: block;
            margin-top: 2px;
        }
        .feed-header .user-stats {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-left: 8px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-outline {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .btn-outline.active {
            background: rgba(192, 132, 252, 0.15);
            border-color: rgba(192, 132, 252, 0.3);
            color: #c084fc;
        }
        .btn-logout {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-logout:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .post-form {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 32px;
            padding: 18px 20px 14px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
        }
        .post-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 14px 18px;
            color: #f0f0f5;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 70px;
            transition: border 0.2s;
            outline: none;
        }
        .post-form textarea:focus {
            border-color: rgba(192, 132, 252, 0.4);
            background: rgba(0, 0, 0, 0.3);
        }
        .post-form textarea::placeholder { color: rgba(255, 255, 255, 0.2); }
        .post-form .form-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .emoji-picker {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px 8px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .emoji-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            transition: 0.15s;
            padding: 4px 6px;
            border-radius: 30px;
            line-height: 1;
        }
        .emoji-btn:hover { background: rgba(255, 255, 255, 0.06); transform: scale(1.15); }
        .btn-post {
            background: linear-gradient(145deg, #c084fc, #8b5cf6);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 60px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }
        .btn-post:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(139, 92, 246, 0.5);
        }
        .btn-post:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .post-card {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 28px;
            padding: 20px 22px 16px;
            margin-bottom: 18px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: all 0.2s;
            backdrop-filter: blur(4px);
            animation: cardIn 0.3s ease;
        }
        @keyframes cardIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .post-card:hover {
            background: rgba(255, 255, 255, 0.035);
            border-color: rgba(255, 255, 255, 0.04);
        }
        .post-card .post-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
        }
        .post-card .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .post-card .post-author {
            font-weight: 600;
            font-size: 17px;
        }
        .post-card .post-author small {
            font-weight: 400;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            margin-left: 6px;
        }
        .post-card .post-time {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.18);
            margin-left: auto;
        }
        .post-card .post-text {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.85);
            margin: 6px 0 16px;
            word-break: break-word;
        }
        .post-card .post-text iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            border: none;
            margin: 12px 0 6px;
            background: rgba(0,0,0,0.3);
        }
        .post-card .post-footer {
            display: flex;
            align-items: center;
            gap: 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 12px;
        }
        .post-card .like-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.25);
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            padding: 4px 12px 4px 6px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.02);
        }
        .post-card .like-btn:hover { color: #f472b6; background: rgba(244, 114, 182, 0.06); }
        .post-card .like-btn.liked { color: #f472b6; }
        .post-card .like-btn i { font-size: 18px; }
        .post-card .like-count { font-weight: 500; min-width: 20px; }
        .post-card .delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.08);
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .post-card .delete-btn:hover { color: rgba(255, 80, 80, 0.6); background: rgba(255, 80, 80, 0.06); }
        .empty-feed {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255, 255, 255, 0.15);
        }
        .empty-feed i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
        .empty-feed p { font-size: 16px; }
        .error-message {
            color: #f87171;
            font-size: 14px;
            margin-top: -8px;
            text-align: center;
            background: rgba(248, 113, 113, 0.08);
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid rgba(248, 113, 113, 0.1);
            display: none;
        }
        .error-message.show {
            display: block;
            animation: fadeUp 0.3s ease;
        }
        .connection-panel {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        .connection-panel .peer-id {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 30px;
            word-break: break-all;
            flex: 1;
            min-width: 100px;
        }
        .connection-panel .peer-id strong {
            color: rgba(255,255,255,0.7);
        }
        .connection-panel input {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 8px 16px;
            color: #f0f0f5;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            flex: 1;
            min-width: 120px;
        }
        .connection-panel input:focus {
            border-color: rgba(192,132,252,0.4);
        }
        .connection-panel .btn-connect {
            background: rgba(192,132,252,0.15);
            border: 1px solid rgba(192,132,252,0.2);
            color: #c084fc;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        .connection-panel .btn-connect:hover {
            background: rgba(192,132,252,0.25);
        }
        .connection-panel .btn-connect:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .connection-panel .status-msg {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
        }
        @media (max-width: 480px) {
            .app { padding: 22px 16px; border-radius: 32px; }
            .brand h1 { font-size: 20px; }
            .brand .online-status { font-size: 12px; padding: 4px 12px; }
            .login-screen .avatar-option .circle { width: 60px; height: 60px; font-size: 30px; }
            .login-screen .avatar-select { gap: 20px; }
            .login-form { max-width: 100%; }
            .btn-primary { padding: 14px; font-size: 16px; }
            .post-form textarea { font-size: 15px; min-height: 60px; }
            .feed-header .user-name { font-size: 17px; }
            .header-actions .btn-outline { font-size: 12px; padding: 6px 12px; }
            .connection-panel { flex-direction: column; align-items: stretch; }
            .connection-panel input { min-width: unset; }
        }
    </style>
</head>
<body>

<div class="app" id="app">

    <div class="brand">
        <div class="brand-icon">✦</div>
        <h1>Саши &amp; Миши</h1>
        <div class="online-status" id="connectionStatus">
            <span class="dot-online" id="statusDot"></span>
            <span id="statusText">онлайн</span>
        </div>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div class="login-screen" id="loginScreen">
        <div class="subtitle">
            <i class="fas fa-user-plus" style="margin-right:8px;"></i> выбери персонажа и аватарку
        </div>
        <div class="avatar-select" id="avatarSelect">
            <div class="avatar-option active" data-animal="🐱">
                <div class="circle" style="background: rgba(255,200,200,0.15);">🐱</div>
                <span class="label">Кошка</span>
            </div>
            <div class="avatar-option" data-animal="🐶">
                <div class="circle" style="background: rgba(200,200,255,0.15);">🐶</div>
                <span class="label">Собака</span>
            </div>
            <div class="avatar-option" data-animal="🐒">
                <div class="circle" style="background: rgba(200,255,200,0.15);">🐒</div>
                <span class="label">Обезьяна</span>
            </div>
        </div>
        <div class="login-form">
            <input type="text" id="firstNameInput" placeholder="Имя (Саша, Миша...)" value="Александр" />
            <input type="text" id="lastNameInput" placeholder="Фамилия" value="Иванов" />
            <div class="error-message" id="errorMessage">⚠️ Имя должно быть Саша или Миша (или производные)</div>
            <button class="btn-primary" id="loginBtn">
                <i class="fas fa-arrow-right" style="margin-right:10px;"></i> Войти
            </button>
        </div>
        <div class="login-hint">
            <i class="fas fa-shield-alt" style="margin-right:6px;"></i> только для Саш и Миш · P2P доставка
        </div>
    </div>

    <!-- ЛЕНТА -->
    <div class="feed" id="feed">

        <div class="feed-header">
            <div class="user-block">
                <div class="user-avatar" id="currentUserAvatar">🐱</div>
                <div>
                    <div class="user-name" id="currentUserName">
                        Александр Иванов
                        <small id="userStatus"><span class="online-badge" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;margin-right:4px;"></span> online</small>
                    </div>
                    <div class="user-stats" id="userStats">
                        <i class="fas fa-pencil-alt" style="margin-right:4px;"></i> постов: <span id="postCount">0</span>
                        <span style="margin-left:12px; opacity:0.5;">| всего: <span id="totalCount">0</span></span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-outline" id="filterMyBtn"><i class="fas fa-user"></i> Мои</button>
                <button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt" style="margin-right:6px;"></i> Выйти</button>
            </div>
        </div>

        <!-- Панель подключения PeerJS -->
        <div class="connection-panel" id="peerPanel">
            <div class="peer-id" id="myPeerId">ID: <strong id="peerIdDisplay">—</strong></div>
            <input type="text" id="friendIdInput" placeholder="ID друга" />
            <button class="btn-connect" id="connectBtn">Подключиться</button>
            <span class="status-msg" id="connectionStatusMsg">не подключен</span>
        </div>

        <div class="post-form">
            <textarea id="postInput" placeholder="Что нового? Вставь ссылку на YouTube — будет видео 🔥" rows="2"></textarea>
            <div class="form-toolbar">
                <div class="emoji-picker" id="emojiPicker">
                    <button class="emoji-btn" data-emoji="❤️">❤️</button>
                    <button class="emoji-btn" data-emoji="😂">😂</button>
                    <button class="emoji-btn" data-emoji="😍">😍</button>
                    <button class="emoji-btn" data-emoji="🔥">🔥</button>
                    <button class="emoji-btn" data-emoji="🎉">🎉</button>
                </div>
                <button class="btn-post" id="postBtn"><i class="fas fa-pen" style="margin-right:8px;"></i> Опубликовать</button>
            </div>
        </div>

        <div id="postsContainer">
            <div class="empty-feed" id="emptyFeed">
                <i class="fas fa-comment-dots"></i>
                <p>Загрузка сообщений...</p>
            </div>
        </div>

    </div>
</div>

<script>
    (function() {
        'use strict';

        // ===== СОСТОЯНИЕ =====
        let currentUserAvatar = '🐱';
        let currentUserFullName = '';
        let filterMyPosts = false;
        let posts = [];
        let isLoggedIn = false;
        let peer = null;          // PeerJS экземпляр
        let conn = null;          // активное соединение
        let myPeerId = '';
        let isConnected = false;

        // ===== КЛЮЧИ LOCALSTORAGE =====
        const LS_POSTS_KEY = 'sasha_misha_posts_local_p2p';
        const LS_USER_KEY = 'sasha_misha_user_p2p';

        // ===== DOM =====
        const loginScreen = document.getElementById('loginScreen');
        const feed = document.getElementById('feed');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const avatarOptions = document.querySelectorAll('.avatar-option');
        const firstNameInput = document.getElementById('firstNameInput');
        const lastNameInput = document.getElementById('lastNameInput');
        const errorMessage = document.getElementById('errorMessage');
        const currentUserAvatarEl = document.getElementById('currentUserAvatar');
        const currentUserNameEl = document.getElementById('currentUserName');
        const postCountEl = document.getElementById('postCount');
        const totalCountEl = document.getElementById('totalCount');
        const postInput = document.getElementById('postInput');
        const postBtn = document.getElementById('postBtn');
        const postsContainer = document.getElementById('postsContainer');
        const emptyFeed = document.getElementById('emptyFeed');
        const filterMyBtn = document.getElementById('filterMyBtn');
        const emojiPicker = document.getElementById('emojiPicker');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const peerIdDisplay = document.getElementById('peerIdDisplay');
        const friendIdInput = document.getElementById('friendIdInput');
        const connectBtn = document.getElementById('connectBtn');
        const connectionStatusMsg = document.getElementById('connectionStatusMsg');

        // ===== ВСПОМОГАТЕЛЬНЫЕ =====
        function formatTime(ts) {
            const d = new Date(ts);
            return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        function renderPostText(text) {
            let safe = escapeHtml(text);
            const youtubeRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/g;
            safe = safe.replace(youtubeRegex, (match, videoId) => {
                return `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
            });
            return safe;
        }

        function isValidName(firstName) {
            const lower = firstName.toLowerCase().trim();
            return lower.startsWith('саш') || lower === 'александр' || lower === 'саня' ||
                   lower.startsWith('миш') || lower === 'михаил' || lower === 'митя';
        }

        // ===== РАБОТА С LOCALSTORAGE =====
        function savePostsToLocalStorage() {
            try {
                localStorage.setItem(LS_POSTS_KEY, JSON.stringify(posts));
            } catch (e) {}
        }
        function loadPostsFromLocalStorage() {
            try {
                const data = localStorage.getItem(LS_POSTS_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        posts = parsed;
                        return true;
                    }
                }
            } catch (e) {}
            return false;
        }
        function saveUserToLocalStorage(avatar, fullName) {
            try {
                localStorage.setItem(LS_USER_KEY, JSON.stringify({ avatar, fullName }));
            } catch (e) {}
        }
        function loadUserFromLocalStorage() {
            try {
                const data = localStorage.getItem(LS_USER_KEY);
                if (data) {
                    const { avatar, fullName } = JSON.parse(data);
                    if (avatar && fullName) return { avatar, fullName };
                }
            } catch (e) {}
            return null;
        }

        // ===== РЕНДЕР ПОСТОВ =====
        function renderPosts() {
            const children = postsContainer.children;
            for (let i = children.length - 1; i >= 0; i--) {
                if (children[i].id !== 'emptyFeed') {
                    children[i].remove();
                }
            }

            let filtered = [...posts];
            if (filterMyPosts && currentUserFullName) {
                filtered = filtered.filter(p => p.author === currentUserFullName);
            }
            filtered.sort((a, b) => b.timestamp - a.timestamp);

            totalCountEl.textContent = posts.length;

            if (filtered.length === 0) {
                emptyFeed.style.display = 'block';
                emptyFeed.querySelector('p').textContent = posts.length === 0 ? '📭 Сообщений пока нет. Напишите первым!' : (filterMyPosts ? 'У тебя пока нет постов 😢' : 'Нет постов');
                updateStats();
                return;
            }
            emptyFeed.style.display = 'none';

            filtered.forEach((post) => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.dataset.id = post.id;

                const isAuthor = post.author === currentUserFullName;
                const avatarEmoji = post.avatar || '🐱';
                const renderedText = renderPostText(post.text);

                card.innerHTML = `
                    <div class="post-header">
                        <div class="post-avatar" style="background: rgba(255,255,255,0.05);">${avatarEmoji}</div>
                        <span class="post-author">${escapeHtml(post.author)} <small>${avatarEmoji}</small></span>
                        <span class="post-time">${formatTime(post.timestamp)}</span>
                    </div>
                    <div class="post-text">${renderedText}</div>
                    <div class="post-footer">
                        <button class="like-btn ${post.likes.includes(currentUserFullName) ? 'liked' : ''}" data-postid="${post.id}">
                            <i class="fas fa-heart"></i>
                            <span class="like-count">${post.likes.length}</span>
                        </button>
                        ${isAuthor ? `<button class="delete-btn" data-postid="${post.id}"><i class="fas fa-trash-alt"></i></button>` : ''}
                    </div>
                `;

                postsContainer.appendChild(card);

                const likeBtn = card.querySelector('.like-btn');
                if (likeBtn) {
                    likeBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.postid;
                        toggleLike(id);
                    });
                }
                const deleteBtn = card.querySelector('.delete-btn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = this.dataset.postid;
                        deletePost(id);
                    });
                }
            });

            updateStats();
        }

        function updateStats() {
            if (!currentUserFullName) return;
            const myPosts = posts.filter(p => p.author === currentUserFullName).length;
            postCountEl.textContent = myPosts;
        }

        // ===== ЛАЙК =====
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            const idx = post.likes.indexOf(currentUserFullName);
            if (idx === -1) post.likes.push(currentUserFullName);
            else post.likes.splice(idx, 1);
            renderPosts();
            savePostsToLocalStorage();
            // Отправляем обновление лайка через P2P, если есть соединение
            if (isConnected && conn) {
                conn.send({ type: 'like_update', postId, likes: post.likes });
            }
        }

        // ===== УДАЛЕНИЕ =====
        function deletePost(postId) {
            if (confirm('Удалить пост?')) {
                posts = posts.filter(p => p.id !== postId);
                renderPosts();
                savePostsToLocalStorage();
                if (isConnected && conn) {
                    conn.send({ type: 'delete', postId });
                }
            }
        }

        // ===== ДОБАВЛЕНИЕ =====
        function addPost(text) {
            const trimmed = text.trim();
            if (!trimmed) { alert('Напишите что-нибудь!'); return false; }
            if (trimmed.length > 500) { alert('Максимум 500 символов'); return false; }
            if (!currentUserFullName) { alert('Сначала войдите!'); return false; }

            const newPost = {
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                author: currentUserFullName,
                avatar: currentUserAvatar,
                text: trimmed,
                timestamp: Date.now(),
                likes: []
            };
            posts.push(newPost);
            renderPosts();
            savePostsToLocalStorage();
            postInput.value = '';
            postInput.focus();

            // Отправляем через P2P
            if (isConnected && conn) {
                conn.send({ type: 'new_post', post: newPost });
            } else {
                console.warn('Нет подключения к другу, сообщение сохранено локально');
            }
            return true;
        }

        // ===== ПРИЁМ СООБЩЕНИЙ ОТ ДРУГА =====
        function handlePeerData(data) {
            console.log('📨 Получены данные от друга:', data);
            if (data.type === 'new_post') {
                const post = data.post;
                // Проверяем, нет ли уже такого поста (чтобы избежать дублирования)
                const exists = posts.some(p => p.id === post.id);
                if (!exists) {
                    posts.push(post);
                    renderPosts();
                    savePostsToLocalStorage();
                }
            } else if (data.type === 'like_update') {
                const post = posts.find(p => p.id === data.postId);
                if (post) {
                    post.likes = data.likes;
                    renderPosts();
                    savePostsToLocalStorage();
                }
            } else if (data.type === 'delete') {
                posts = posts.filter(p => p.id !== data.postId);
                renderPosts();
                savePostsToLocalStorage();
            }
        }

        // ===== PEERJS =====
        function initPeer() {
            // Генерируем случайный ID для сессии
            const randomId = 'sasha-misha-' + Math.random().toString(36).substr(2, 8);
            myPeerId = randomId;

            peer = new Peer(randomId, {
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
                console.log('🔗 Peer открыт, ID:', id);
                peerIdDisplay.textContent = id;
                connectionStatusMsg.textContent = 'ожидание подключения';
                statusDot.className = 'dot-online';
                statusText.textContent = 'онлайн';
            });

            peer.on('connection', (incomingConn) => {
                console.log('📞 Входящее соединение от:', incomingConn.peer);
                conn = incomingConn;
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                console.error('❌ Ошибка Peer:', err);
                if (err.type === 'peer-unavailable') {
                    connectionStatusMsg.textContent = '❌ Друг не в сети';
                } else {
                    connectionStatusMsg.textContent = '⚠️ Ошибка: ' + err.message;
                }
                statusDot.className = 'dot-offline';
                statusText.textContent = 'ошибка';
            });

            peer.on('disconnected', () => {
                console.log('🔌 Peer отключился');
                connectionStatusMsg.textContent = 'отключен';
                isConnected = false;
                conn = null;
                statusDot.className = 'dot-offline';
                statusText.textContent = 'офлайн';
            });
        }

        function setupConnection(connection) {
            conn = connection;
            conn.on('open', () => {
                console.log('✅ Соединение установлено с:', conn.peer);
                isConnected = true;
                connectionStatusMsg.textContent = '✅ подключен к ' + conn.peer;
                connectBtn.textContent = 'Отключиться';
                statusDot.className = 'dot-online';
                statusText.textContent = 'связан';
                // Отправляем свою историю сообщений (для синхронизации)
                // Отправим все посты, но чтобы не дублировать, лучше отправлять только свои
                // Просто уведомим друга о том, что мы подключились
                conn.send({ type: 'sync_request' });
            });

            conn.on('data', (data) => {
                // Если пришёл запрос синхронизации — отправляем все свои посты
                if (data.type === 'sync_request') {
                    // Отправляем все посты, которые есть у нас (чтобы у друга они тоже были)
                    // Но чтобы не засорять, отправим только те, которых у друга нет (можно через фильтр, но упростим)
                    // Отправим все посты, а на стороне друга будет проверка на дубликаты
                    posts.forEach(post => {
                        conn.send({ type: 'new_post', post });
                    });
                    connectionStatusMsg.textContent = '✅ синхронизировано';
                } else {
                    handlePeerData(data);
                }
            });

            conn.on('close', () => {
                console.log('🔌 Соединение закрыто');
                isConnected = false;
                conn = null;
                connectionStatusMsg.textContent = 'отключен';
                connectBtn.textContent = 'Подключиться';
                statusDot.className = 'dot-offline';
                statusText.textContent = 'офлайн';
            });

            conn.on('error', (err) => {
                console.error('❌ Ошибка соединения:', err);
                connectionStatusMsg.textContent = '⚠️ ошибка соединения';
            });
        }

        function connectToFriend(friendId) {
            if (!peer) {
                alert('Peer не инициализирован');
                return;
            }
            if (conn && isConnected) {
                // Отключаемся
                conn.close();
                conn = null;
                isConnected = false;
                connectionStatusMsg.textContent = 'отключен';
                connectBtn.textContent = 'Подключиться';
                statusDot.className = 'dot-offline';
                statusText.textContent = 'офлайн';
                return;
            }

            if (!friendId.trim()) {
                alert('Введите ID друга');
                return;
            }

            connectionStatusMsg.textContent = '⏳ подключение...';
            connectBtn.disabled = true;
            statusDot.className = 'dot-connecting';
            statusText.textContent = 'соединение...';

            const newConn = peer.connect(friendId.trim(), { reliable: true });
            setupConnection(newConn);

            // Таймаут на случай, если соединение не установится
            setTimeout(() => {
                connectBtn.disabled = false;
                if (!isConnected) {
                    connectionStatusMsg.textContent = '⏳ не удалось подключиться';
                    statusDot.className = 'dot-offline';
                    statusText.textContent = 'офлайн';
                }
            }, 10000);
        }

        // ===== ВХОД =====
        function login(avatarEmoji, firstName, lastName) {
            const name = firstName.trim();
            const surname = lastName.trim() || '';
            if (!isValidName(name)) {
                errorMessage.textContent = '⚠️ Имя должно быть Саша или Миша (или производные: Александр, Михаил, Саня, Митя)';
                errorMessage.classList.add('show');
                return;
            }
            errorMessage.classList.remove('show');

            const fullName = surname ? `${name} ${surname}` : name;
            currentUserFullName = fullName;
            currentUserAvatar = avatarEmoji;
            isLoggedIn = true;

            saveUserToLocalStorage(avatarEmoji, fullName);

            currentUserAvatarEl.textContent = avatarEmoji;
            currentUserNameEl.innerHTML = `${escapeHtml(fullName)} <small id="userStatus"><span class="online-badge" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4ade80;margin-right:4px;"></span> online</small>`;

            loginScreen.style.display = 'none';
            feed.classList.add('show');
            postInput.value = '';
            filterMyPosts = false;
            filterMyBtn.classList.remove('active');

            // Загружаем посты из localStorage
            const hasLocal = loadPostsFromLocalStorage();
            if (hasLocal) {
                renderPosts();
            } else {
                renderPosts(); // пустой
            }

            // Инициализируем PeerJS
            initPeer();

            // Восстанавливаем ID друга из localStorage, если есть
            const savedFriend = localStorage.getItem('sasha_misha_friend_id');
            if (savedFriend) {
                friendIdInput.value = savedFriend;
                // Можно автоматически подключиться, но оставим ручное нажатие
            }
        }

        // ===== ВЫХОД =====
        function logout() {
            isLoggedIn = false;
            if (conn) {
                conn.close();
                conn = null;
                isConnected = false;
            }
            if (peer) {
                peer.destroy();
                peer = null;
            }
            loginScreen.style.display = 'flex';
            feed.classList.remove('show');
            avatarOptions.forEach(opt => opt.classList.remove('active'));
            document.querySelector('.avatar-option[data-animal="🐱"]').classList.add('active');
            currentUserAvatar = '🐱';
            currentUserFullName = '';
            filterMyPosts = false;
            filterMyBtn.classList.remove('active');
            errorMessage.classList.remove('show');
            // Не очищаем localStorage
        }

        // ===== ВОССТАНОВЛЕНИЕ СЕССИИ =====
        function restoreSession() {
            const userData = loadUserFromLocalStorage();
            if (userData && userData.fullName && userData.avatar) {
                firstNameInput.value = userData.fullName.split(' ')[0] || '';
                lastNameInput.value = userData.fullName.split(' ').slice(1).join(' ') || '';
                avatarOptions.forEach(opt => {
                    opt.classList.remove('active');
                    if (opt.dataset.animal === userData.avatar) opt.classList.add('active');
                });
                console.log('👤 Найдены данные пользователя в localStorage. Нажмите "Войти" для восстановления.');
            }
            // Восстанавливаем ID друга
            const savedFriend = localStorage.getItem('sasha_misha_friend_id');
            if (savedFriend) {
                friendIdInput.value = savedFriend;
            }
        }

        // ===== ОБРАБОТЧИКИ =====
        avatarOptions.forEach(opt => {
            opt.addEventListener('click', function() {
                avatarOptions.forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                errorMessage.classList.remove('show');
            });
        });

        loginBtn.addEventListener('click', function() {
            const active = document.querySelector('.avatar-option.active');
            if (!active) return;
            const avatar = active.dataset.animal;
            const firstName = firstNameInput.value;
            const lastName = lastNameInput.value;
            if (!firstName.trim()) { alert('Введите имя!'); return; }
            login(avatar, firstName, lastName);
        });

        logoutBtn.addEventListener('click', logout);

        postBtn.addEventListener('click', function(e) {
            e.preventDefault();
            addPost(postInput.value);
        });

        postInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey || e.shiftKey)) {
                e.preventDefault();
                addPost(this.value);
            } else if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
                e.preventDefault();
                addPost(this.value);
            }
        });

        filterMyBtn.addEventListener('click', function() {
            if (!currentUserFullName) return;
            filterMyPosts = !filterMyPosts;
            this.classList.toggle('active');
            renderPosts();
        });

        emojiPicker.addEventListener('click', function(e) {
            const btn = e.target.closest('.emoji-btn');
            if (!btn) return;
            const emoji = btn.dataset.emoji;
            const textarea = postInput;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const val = textarea.value;
            textarea.value = val.substring(0, start) + emoji + val.substring(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + emoji.length;
        });

        connectBtn.addEventListener('click', function() {
            const friendId = friendIdInput.value.trim();
            if (!friendId) {
                alert('Введите ID друга (покажите ему свой ID и попросите его ID)');
                return;
            }
            // Сохраняем ID друга в localStorage
            localStorage.setItem('sasha_misha_friend_id', friendId);
            connectToFriend(friendId);
        });

        // Если пользователь нажал Enter в поле ввода ID друга
        friendIdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                connectBtn.click();
            }
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        loginScreen.style.display = 'flex';
        feed.classList.remove('show');
        document.querySelector('.avatar-option[data-animal="🐱"]').classList.add('active');

        restoreSession();

        console.log('🚀 Саши и Миши v13 — P2P доставка через PeerJS!');
        console.log('1. Войдите как Саша или Миша.');
        console.log('2. Скопируйте свой ID и отправьте другу.');
        console.log('3. Введите ID друга и нажмите "Подключиться".');
        console.log('4. Общайтесь в реальном времени!');
    })();
</script>

</body>
</html>
