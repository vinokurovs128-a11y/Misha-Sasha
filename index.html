<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐻 Миша & Саша Соцсеть</title>
    <style>
        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #e4e6eb;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3f4b;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555b69;
        }

        /* --- APP CONTAINER --- */
        #app {
            width: 100%;
            max-width: 1100px;
            height: 100vh;
            max-height: 750px;
            background: #14181f;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            margin: 12px;
        }

        /* --- LOGIN SCREEN --- */
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px;
            background: linear-gradient(145deg, #14181f, #1a2029);
            gap: 18px;
        }
        #loginScreen .logo {
            font-size: 64px;
            margin-bottom: 4px;
        }
        #loginScreen h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #loginScreen .sub {
            color: #8a92a5;
            font-size: 14px;
            margin-top: -6px;
            margin-bottom: 12px;
        }
        #loginScreen input {
            width: 100%;
            max-width: 320px;
            padding: 14px 18px;
            border-radius: 14px;
            border: 2px solid #2a313d;
            background: #1e252f;
            color: #e4e6eb;
            font-size: 16px;
            outline: none;
            transition: 0.25s;
        }
        #loginScreen input:focus {
            border-color: #4facfe;
            background: #242d3a;
        }
        #loginScreen input::placeholder {
            color: #6a7287;
        }
        #loginScreen .btn-primary {
            width: 100%;
            max-width: 320px;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 24px rgba(79, 172, 254, 0.25);
        }
        #loginScreen .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(79, 172, 254, 0.35);
        }
        #loginScreen .btn-primary:active {
            transform: scale(0.97);
        }
        #loginScreen .toggle-auth {
            color: #8a92a5;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        #loginScreen .toggle-auth:hover {
            color: #4facfe;
        }
        #loginScreen .error-msg {
            color: #f5576c;
            font-size: 14px;
            min-height: 22px;
        }

        /* --- MAIN LAYOUT --- */
        #mainApp {
            display: none;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        /* --- TOP BAR --- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #1a2029;
            border-bottom: 1px solid #2a313d;
            flex-shrink: 0;
            min-height: 64px;
        }
        .topbar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
        }
        .topbar .brand span {
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .topbar .user-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .topbar .user-info .avatar-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #3a3f4b;
            background: #1e252f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .topbar .user-info .avatar-btn:hover {
            border-color: #4facfe;
            transform: scale(1.05);
        }
        .topbar .user-info .avatar-btn .online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #1a2029;
            background: #2ecc71;
        }
        .topbar .user-info .username-display {
            font-weight: 600;
            font-size: 15px;
        }
        .topbar .user-info .logout-btn {
            background: transparent;
            border: none;
            color: #8a92a5;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .topbar .user-info .logout-btn:hover {
            color: #f5576c;
            background: #2a1f24;
        }

        /* --- BODY: SIDEBAR + CHAT --- */
        .main-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- SIDEBAR (User List) --- */
        .sidebar {
            width: 260px;
            background: #161d26;
            border-right: 1px solid #2a313d;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .sidebar .sidebar-header {
            padding: 14px 18px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #8a92a5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #222b36;
        }
        .sidebar .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }
        .sidebar .user-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 18px;
            cursor: pointer;
            transition: 0.15s;
            border-left: 3px solid transparent;
            position: relative;
        }
        .sidebar .user-item:hover {
            background: #1e2733;
        }
        .sidebar .user-item.active {
            background: #1e2a3a;
            border-left-color: #4facfe;
        }
        .sidebar .user-item .u-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: #1e252f;
            flex-shrink: 0;
            border: 2px solid #2a313d;
            position: relative;
        }
        .sidebar .user-item .u-avatar .online-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: 2px solid #161d26;
            background: #4a505e;
            transition: 0.3s;
        }
        .sidebar .user-item .u-avatar .online-indicator.online {
            background: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
        }
        .sidebar .user-item .u-name {
            font-weight: 500;
            font-size: 15px;
            flex: 1;
        }
        .sidebar .user-item .u-name .me-tag {
            font-size: 11px;
            color: #6a7287;
            font-weight: 400;
            margin-left: 6px;
        }
        .sidebar .user-item .u-status {
            font-size: 12px;
            color: #6a7287;
        }
        .sidebar .user-item .u-status.online-text {
            color: #2ecc71;
        }
        .sidebar .user-item .unread-badge {
            background: #4facfe;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        /* --- CHAT AREA --- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #14181f;
            overflow: hidden;
        }
        .chat-area .chat-header {
            padding: 12px 20px;
            background: #1a2029;
            border-bottom: 1px solid #2a313d;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
            min-height: 60px;
        }
        .chat-area .chat-header .ch-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #1e252f;
            border: 2px solid #2a313d;
        }
        .chat-area .chat-header .ch-name {
            font-weight: 600;
            font-size: 16px;
        }
        .chat-area .chat-header .ch-status {
            font-size: 13px;
            color: #6a7287;
            margin-left: auto;
        }
        .chat-area .chat-header .ch-status.online {
            color: #2ecc71;
        }

        .chat-area .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .chat-area .messages-container .empty-msg {
            color: #4a505e;
            text-align: center;
            font-size: 15px;
            margin-top: 60px;
        }
        .chat-area .messages-container .msg {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
        }
        .chat-area .messages-container .msg.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #4facfe, #00c6fb);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .chat-area .messages-container .msg.received {
            align-self: flex-start;
            background: #1e2733;
            color: #e4e6eb;
            border-bottom-left-radius: 4px;
        }
        .chat-area .messages-container .msg .msg-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
            text-align: right;
        }
        .chat-area .messages-container .msg .msg-emoji {
            font-size: 28px;
            line-height: 1.2;
        }

        /* --- CHAT INPUT --- */
        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: #1a2029;
            border-top: 1px solid #2a313d;
            flex-shrink: 0;
        }
        .chat-input-area .emoji-btn {
            background: transparent;
            border: none;
            font-size: 26px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 10px;
            transition: 0.2s;
            color: #8a92a5;
            line-height: 1;
        }
        .chat-input-area .emoji-btn:hover {
            background: #2a313d;
            color: #e4e6eb;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 14px;
            border: 2px solid #2a313d;
            background: #1e252f;
            color: #e4e6eb;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .chat-input-area input:focus {
            border-color: #4facfe;
        }
        .chat-input-area input::placeholder {
            color: #6a7287;
        }
        .chat-input-area .send-btn {
            padding: 12px 22px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(79, 172, 254, 0.2);
            white-space: nowrap;
        }
        .chat-input-area .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(79, 172, 254, 0.35);
        }
        .chat-input-area .send-btn:active {
            transform: scale(0.96);
        }
        .chat-input-area .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* --- EMOJI PICKER POPUP --- */
        .emoji-picker {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: #1e2733;
            border-radius: 16px;
            padding: 14px 16px;
            border: 1px solid #2a313d;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            z-index: 50;
            max-width: 320px;
            max-height: 260px;
            overflow-y: auto;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
        }
        .emoji-picker.open {
            display: grid;
        }
        .emoji-picker .emoji-option {
            font-size: 28px;
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            text-align: center;
            transition: 0.15s;
            background: transparent;
            border: none;
            line-height: 1.4;
        }
        .emoji-picker .emoji-option:hover {
            background: #2a313d;
            transform: scale(1.15);
        }

        /* --- AVATAR SELECTOR MODAL --- */
        .avatar-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .avatar-modal.open {
            display: flex;
        }
        .avatar-modal .modal-box {
            background: #1a2029;
            border-radius: 24px;
            padding: 30px 32px;
            max-width: 460px;
            width: 90%;
            border: 1px solid #2a313d;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
        }
        .avatar-modal .modal-box h3 {
            font-size: 20px;
            margin-bottom: 16px;
            text-align: center;
            color: #e4e6eb;
        }
        .avatar-modal .modal-box .avatar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            justify-items: center;
            margin: 12px 0 18px;
        }
        .avatar-modal .modal-box .avatar-grid .av-option {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: #1e252f;
            cursor: pointer;
            transition: 0.2s;
        }
        .avatar-modal .modal-box .avatar-grid .av-option:hover {
            transform: scale(1.1);
            border-color: #4facfe;
        }
        .avatar-modal .modal-box .avatar-grid .av-option.selected {
            border-color: #4facfe;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.3);
        }
        .avatar-modal .modal-box .modal-close {
            display: block;
            margin: 6px auto 0;
            padding: 10px 28px;
            border: none;
            border-radius: 12px;
            background: #2a313d;
            color: #e4e6eb;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .avatar-modal .modal-box .modal-close:hover {
            background: #3a3f4b;
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 720px) {
            #app {
                max-height: 100vh;
                border-radius: 0;
                margin: 0;
            }
            .sidebar {
                width: 200px;
            }
            .topbar .brand span {
                font-size: 14px;
            }
            .topbar .user-info .username-display {
                font-size: 13px;
            }
            .chat-area .messages-container .msg {
                max-width: 85%;
                font-size: 14px;
            }
            .avatar-modal .modal-box .avatar-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            .avatar-modal .modal-box .avatar-grid .av-option {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
            .emoji-picker {
                left: 10px;
                right: 10px;
                max-width: unset;
                grid-template-columns: repeat(7, 1fr);
            }
        }
        @media (max-width: 520px) {
            .sidebar {
                width: 60px;
            }
            .sidebar .user-item .u-name,
            .sidebar .user-item .u-status,
            .sidebar .user-item .unread-badge {
                display: none;
            }
            .sidebar .user-item {
                padding: 10px 10px;
                justify-content: center;
            }
            .sidebar .user-item .u-avatar {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            .sidebar .sidebar-header {
                display: none;
            }
            .topbar .brand span {
                font-size: 12px;
            }
            .topbar .user-info .username-display {
                display: none;
            }
            .chat-input-area input {
                font-size: 14px;
                padding: 10px 12px;
            }
            .chat-input-area .send-btn {
                padding: 10px 14px;
                font-size: 13px;
            }
            .avatar-modal .modal-box .avatar-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- ============ APP ============ -->
    <div id="app">

        <!-- ===== LOGIN SCREEN ===== -->
        <div id="loginScreen">
            <div class="logo">🐻</div>
            <h1>Миша &amp; Саша</h1>
            <div class="sub">Социальная сеть для своих</div>
            <input id="loginUsername" type="text" placeholder="Имя пользователя" autocomplete="username" />
            <input id="loginPassword" type="password" placeholder="Пароль" autocomplete="current-password" />
            <button class="btn-primary" id="loginBtn">Войти</button>
            <div class="error-msg" id="loginError"></div>
            <div class="toggle-auth" id="toggleAuth">Нет аккаунта? Зарегистрироваться</div>
        </div>

        <!-- ===== MAIN APP ===== -->
        <div id="mainApp">

            <!-- TOPBAR -->
            <div class="topbar">
                <div class="brand">
                    🐻 <span>Миша &amp; Саша</span>
                </div>
                <div class="user-info">
                    <div class="avatar-btn" id="avatarBtn" title="Сменить аватар">
                        <span id="topAvatarEmoji">🐻</span>
                        <span class="online-dot"></span>
                    </div>
                    <span class="username-display" id="topUsername">misha</span>
                    <button class="logout-btn" id="logoutBtn" title="Выйти">⏻</button>
                </div>
            </div>

            <div class="main-body">

                <!-- SIDEBAR -->
                <div class="sidebar">
                    <div class="sidebar-header">👥 Онлайн</div>
                    <div class="user-list" id="userList"></div>
                </div>

                <!-- CHAT AREA -->
                <div class="chat-area">
                    <div class="chat-header" id="chatHeader">
                        <div class="ch-avatar" id="chatAvatar">👤</div>
                        <span class="ch-name" id="chatName">Выберите собеседника</span>
                        <span class="ch-status" id="chatStatus"> </span>
                    </div>
                    <div class="messages-container" id="messagesContainer">
                        <div class="empty-msg">💬 Нажмите на пользователя, чтобы начать чат</div>
                    </div>
                    <div class="chat-input-area">
                        <button class="emoji-btn" id="emojiBtn" title="Смайлики">😊</button>
                        <input id="messageInput" type="text" placeholder="Напишите сообщение..." />
                        <button class="send-btn" id="sendBtn">Отправить</button>
                    </div>
                    <!-- Emoji picker -->
                    <div class="emoji-picker" id="emojiPicker"></div>
                </div>

            </div>
        </div>

        <!-- ===== AVATAR MODAL ===== -->
        <div class="avatar-modal" id="avatarModal">
            <div class="modal-box">
                <h3>🎨 Выберите аватар</h3>
                <div class="avatar-grid" id="avatarGrid"></div>
                <button class="modal-close" id="avatarModalClose">Закрыть</button>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        //  DATA LAYER
        // ============================================================

        const AVATARS = ['🐻', '🐱', '🐶', '🦊', '🐼', '🐨', '🦁', '🐯', '🐮', '🐷', '🐵', '🐔', '🐧', '🦆', '🦉', '🐺', '🐴', '🦄', '🐲', '🐉'];

        const EMOJIS = [
            '😊', '😂', '🤣', '❤️', '🥰', '😍', '🤩', '😘',
            '😗', '😙', '😚', '🥲', '😀', '😁', '😅', '😆',
            '😇', '😉', '😌', '😎', '🥳', '😏', '😒', '😞',
            '😔', '😟', '😕', '🙁', '☹️', '😣', '😖', '😫',
            '😩', '🥺', '😢', '😭', '😤', '😠', '😡', '🤬',
            '🤯', '😳', '🥵', '🥶', '😱', '😨', '😰', '😥',
            '😓', '🤗', '🤔', '🤭', '🤫', '🤥', '😶', '😐',
            '😑', '😬', '🙄', '😯', '😦', '😧', '😮', '😲',
            '😴', '🤤', '😪', '😵', '🤐', '🥴', '🤢', '🤮',
            '🤧', '😷', '🤒', '🤕', '🤑', '🤠', '😈', '👿',
            '👹', '👺', '🤡', '💩', '👻', '💀', '☠️', '👽',
            '👾', '🤖', '🎃', '😺', '😸', '😹', '😻', '😼',
            '😽', '🙀', '😿', '😾', '👍', '👎', '👊', '✊',
            '🤛', '🤜', '👏', '🙌', '👐', '🤲', '🤝', '🙏',
            '✌️', '🤟', '🤘', '👌', '👈', '👉', '👆', '👇',
            '☝️', '✋', '🤚', '🖐️', '🖖', '👋', '🤙', '💪',
            '🦾', '🖕', '✍️', '🙇', '💁', '🙅', '🙆', '🙋',
            '🧏', '🤦', '🤷', '🙎', '🙍', '💇', '💆', '🧖',
            '💅', '👰', '🤵', '🦸', '🦹', '🧙', '🧚', '🧛',
            '🧜', '🧝', '🧞', '🧟', '💃', '🕺', '🕴️', '👯'
        ];

        // Default users
        const DEFAULT_USERS = {
            misha: { password: '123', avatar: 0, lastSeen: Date.now() },
            sasha: { password: '123', avatar: 1, lastSeen: Date.now() }
        };

        // ----- helpers -----
        function getUsers() {
            try {
                const raw = localStorage.getItem('ms_users');
                if (raw) {
                    const parsed = JSON.parse(raw);
                    // ensure defaults exist
                    let changed = false;
                    for (const [k, v] of Object.entries(DEFAULT_USERS)) {
                        if (!parsed[k]) {
                            parsed[k] = { ...v };
                            changed = true;
                        }
                    }
                    if (changed) localStorage.setItem('ms_users', JSON.stringify(parsed));
                    return parsed;
                }
                // init
                localStorage.setItem('ms_users', JSON.stringify(DEFAULT_USERS));
                return { ...DEFAULT_USERS };
            } catch { return { ...DEFAULT_USERS }; }
        }

        function saveUsers(users) {
            localStorage.setItem('ms_users', JSON.stringify(users));
        }

        function getMessages() {
            try {
                const raw = localStorage.getItem('ms_messages');
                return raw ? JSON.parse(raw) : {};
            } catch { return {}; }
        }

        function saveMessages(messages) {
            localStorage.setItem('ms_messages', JSON.stringify(messages));
        }

        function getChatKey(userA, userB) {
            const [a, b] = [userA.toLowerCase(), userB.toLowerCase()].sort();
            return `chat_${a}_${b}`;
        }

        function getConversation(userA, userB) {
            const key = getChatKey(userA, userB);
            const all = getMessages();
            return all[key] || [];
        }

        function addMessage(from, to, text, isEmoji = false) {
            const key = getChatKey(from, to);
            const all = getMessages();
            if (!all[key]) all[key] = [];
            all[key].push({
                from,
                text,
                timestamp: Date.now(),
                isEmoji
            });
            saveMessages(all);
            // broadcast
            broadcast({ type: 'new_message', key, from, to, text, isEmoji });
            // update unread
            updateUnreadCounts();
            return all[key];
        }

        function getUnreadCounts() {
            try {
                const raw = localStorage.getItem('ms_unread');
                return raw ? JSON.parse(raw) : {};
            } catch { return {}; }
        }

        function saveUnreadCounts(unread) {
            localStorage.setItem('ms_unread', JSON.stringify(unread));
        }

        function markAsRead(user, other) {
            const key = getChatKey(user, other);
            const unread = getUnreadCounts();
            if (unread[key]) {
                delete unread[key];
                saveUnreadCounts(unread);
                broadcast({ type: 'unread_update', unread });
            }
        }

        function updateUnreadCounts() {
            // This is called when new messages arrive
            // The unread counts are stored per chat key for the recipient
            // We'll handle this in the message receive logic
        }

        // ----- broadcast channel (real-time cross-tab) -----
        let channel = null;
        try {
            channel = new BroadcastChannel('ms_channel');
        } catch { /* fallback */ }

        function broadcast(data) {
            try {
                if (channel) channel.postMessage(data);
            } catch { /* ignore */ }
        }

        // ----- online heartbeat -----
        let heartbeatInterval = null;
        let currentUser = null;

        function startHeartbeat(user) {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            currentUser = user;
            // immediately update
            updateOnlineStatus(user);
            heartbeatInterval = setInterval(() => {
                if (currentUser) updateOnlineStatus(currentUser);
            }, 8000);
        }

        function updateOnlineStatus(user) {
            const users = getUsers();
            if (users[user]) {
                users[user].lastSeen = Date.now();
                saveUsers(users);
                broadcast({ type: 'online_update', user, lastSeen: Date.now() });
                renderUserList();
            }
        }

        function isUserOnline(user) {
            const users = getUsers();
            if (!users[user]) return false;
            const now = Date.now();
            return (now - users[user].lastSeen) < 12000; // 12s threshold
        }

        function getOnlineUsers() {
            const users = getUsers();
            const result = {};
            for (const [name, data] of Object.entries(users)) {
                result[name] = isUserOnline(name);
            }
            return result;
        }

        // ============================================================
        //  RENDER
        // ============================================================

        let selectedChat = null;
        let currentUserData = null; // { username, avatarIndex }

        function renderUserList() {
            const container = document.getElementById('userList');
            const users = getUsers();
            const online = getOnlineUsers();
            const unread = getUnreadCounts();

            let html = '';
            const sorted = Object.keys(users).sort((a, b) => {
                if (a === currentUserData?.username) return 1;
                if (b === currentUserData?.username) return -1;
                return a.localeCompare(b);
            });

            for (const name of sorted) {
                if (name === currentUserData?.username) continue;
                const isOnline = online[name] || false;
                const avatarIdx = users[name]?.avatar ?? 0;
                const avatarEmoji = AVATARS[avatarIdx % AVATARS.length] || '👤';
                const unreadCount = unread[getChatKey(currentUserData?.username || '', name)] || 0;
                const isActive = selectedChat === name;

                html += `
                    <div class="user-item ${isActive ? 'active' : ''}" data-user="${name}">
                        <div class="u-avatar">
                            ${avatarEmoji}
                            <span class="online-indicator ${isOnline ? 'online' : ''}"></span>
                        </div>
                        <span class="u-name">${name}</span>
                        <span class="u-status ${isOnline ? 'online-text' : ''}">${isOnline ? '🟢' : '⚪'}</span>
                        ${unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : ''}
                    </div>
                `;
            }

            if (!html) {
                html = `<div style="padding:20px;text-align:center;color:#4a505e;font-size:14px;">Нет других пользователей</div>`;
            }

            container.innerHTML = html;

            // click handlers
            container.querySelectorAll('.user-item').forEach(el => {
                el.addEventListener('click', () => {
                    const user = el.dataset.user;
                    if (user && user !== currentUserData?.username) {
                        selectChat(user);
                    }
                });
            });
        }

        function selectChat(otherUser) {
            if (!currentUserData) return;
            selectedChat = otherUser;
            // mark as read
            markAsRead(currentUserData.username, otherUser);
            renderUserList();
            renderChat();
            renderChatHeader();
        }

        function renderChatHeader() {
            const users = getUsers();
            const name = selectedChat;
            const avatarIdx = users[name]?.avatar ?? 0;
            const avatarEmoji = AVATARS[avatarIdx % AVATARS.length] || '👤';
            const isOnline = isUserOnline(name);

            document.getElementById('chatAvatar').textContent = avatarEmoji;
            document.getElementById('chatName').textContent = name || 'Выберите собеседника';
            const statusEl = document.getElementById('chatStatus');
            if (name) {
                statusEl.textContent = isOnline ? '🟢 онлайн' : '⚪ офлайн';
                statusEl.className = 'ch-status' + (isOnline ? ' online' : '');
            } else {
                statusEl.textContent = '';
                statusEl.className = 'ch-status';
            }
        }

        function renderChat() {
            const container = document.getElementById('messagesContainer');
            if (!selectedChat || !currentUserData) {
                container.innerHTML = `<div class="empty-msg">💬 Нажмите на пользователя, чтобы начать чат</div>`;
                return;
            }

            const messages = getConversation(currentUserData.username, selectedChat);
            if (!messages.length) {
                container.innerHTML = `<div class="empty-msg">💬 Начните диалог с ${selectedChat}</div>`;
                return;
            }

            let html = '';
            for (const msg of messages) {
                const isSent = msg.from === currentUserData.username;
                const time = new Date(msg.timestamp);
                const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const content = msg.isEmoji ?
                    `<span class="msg-emoji">${msg.text}</span>` :
                    msg.text;

                html += `
                    <div class="msg ${isSent ? 'sent' : 'received'}">
                        ${content}
                        <span class="msg-time">${timeStr}</span>
                    </div>
                `;
            }

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        // ----- topbar -----
        function updateTopbar() {
            if (!currentUserData) return;
            const users = getUsers();
            const idx = users[currentUserData.username]?.avatar ?? 0;
            document.getElementById('topAvatarEmoji').textContent = AVATARS[idx % AVATARS.length] || '🐻';
            document.getElementById('topUsername').textContent = currentUserData.username;
        }

        // ----- avatar modal -----
        function renderAvatarModal() {
            const grid = document.getElementById('avatarGrid');
            const users = getUsers();
            const currentIdx = users[currentUserData?.username]?.avatar ?? 0;

            let html = '';
            for (let i = 0; i < AVATARS.length; i++) {
                const selected = i === currentIdx ? 'selected' : '';
                html += `
                    <div class="av-option ${selected}" data-idx="${i}">
                        ${AVATARS[i]}
                    </div>
                `;
            }
            grid.innerHTML = html;

            grid.querySelectorAll('.av-option').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    if (!isNaN(idx) && currentUserData) {
                        const users2 = getUsers();
                        if (users2[currentUserData.username]) {
                            users2[currentUserData.username].avatar = idx;
                            saveUsers(users2);
                            currentUserData.avatarIndex = idx;
                            updateTopbar();
                            renderUserList();
                            renderChatHeader();
                            renderAvatarModal(); // refresh selection
                            broadcast({ type: 'avatar_update', user: currentUserData.username, avatar: idx });
                        }
                    }
                });
            });
        }

        // ----- emoji picker -----
        function renderEmojiPicker() {
            const picker = document.getElementById('emojiPicker');
            let html = '';
            for (const emoji of EMOJIS) {
                html += `<button class="emoji-option" data-emoji="${emoji}">${emoji}</button>`;
            }
            picker.innerHTML = html;

            picker.querySelectorAll('.emoji-option').forEach(el => {
                el.addEventListener('click', () => {
                    const emoji = el.dataset.emoji;
                    const input = document.getElementById('messageInput');
                    input.value += emoji;
                    input.focus();
                    document.getElementById('emojiPicker').classList.remove('open');
                });
            });
        }

        // ============================================================
        //  AUTH
        // ============================================================

        function login(username, password) {
            const users = getUsers();
            const user = username.toLowerCase().trim();
            if (!user) {
                document.getElementById('loginError').textContent = 'Введите имя пользователя';
                return false;
            }
            if (!users[user]) {
                document.getElementById('loginError').textContent = 'Пользователь не найден';
                return false;
            }
            if (users[user].password !== password) {
                document.getElementById('loginError').textContent = 'Неверный пароль';
                return false;
            }

            // success
            document.getElementById('loginError').textContent = '';
            currentUserData = { username: user, avatarIndex: users[user].avatar || 0 };
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';

            updateTopbar();
            renderUserList();
            renderChatHeader();
            renderChat();
            renderAvatarModal();
            renderEmojiPicker();

            // start heartbeat
            startHeartbeat(user);

            // listen to broadcast
            if (channel) {
                channel.onmessage = (e) => {
                    handleBroadcast(e.data);
                };
            }

            // listen to storage events (fallback for cross-tab)
            window.addEventListener('storage', (e) => {
                if (e.key === 'ms_users' || e.key === 'ms_messages' || e.key === 'ms_unread') {
                    // refresh UI
                    if (currentUserData) {
                        renderUserList();
                        renderChat();
                        renderChatHeader();
                    }
                }
            });

            return true;
        }

        function register(username, password) {
            const users = getUsers();
            const user = username.toLowerCase().trim();
            if (!user) {
                document.getElementById('loginError').textContent = 'Введите имя пользователя';
                return false;
            }
            if (users[user]) {
                document.getElementById('loginError').textContent = 'Пользователь уже существует';
                return false;
            }
            if (password.length < 1) {
                document.getElementById('loginError').textContent = 'Введите пароль';
                return false;
            }

            users[user] = { password, avatar: 0, lastSeen: Date.now() };
            saveUsers(users);
            document.getElementById('loginError').textContent = '✅ Аккаунт создан! Войдите.';
            return true;
        }

        function logout() {
            if (heartbeatInterval) clearInterval(heartbeatInterval);
            currentUserData = null;
            selectedChat = null;
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').textContent = '';
            if (channel) channel.onmessage = null;
        }

        // ============================================================
        //  BROADCAST HANDLER
        // ============================================================

        function handleBroadcast(data) {
            if (!currentUserData) return;

            if (data.type === 'new_message') {
                // if this message involves the current user
                const key = data.key;
                const [a, b] = key.replace('chat_', '').split('_');
                if (a === currentUserData.username || b === currentUserData.username) {
                    // reload messages
                    if (selectedChat && (selectedChat === a || selectedChat === b)) {
                        // if the chat is currently open, mark as read
                        const other = a === currentUserData.username ? b : a;
                        if (selectedChat === other) {
                            markAsRead(currentUserData.username, other);
                        }
                        renderChat();
                        renderUserList();
                        renderChatHeader();
                    } else {
                        // update unread badge
                        const unread = getUnreadCounts();
                        const other = a === currentUserData.username ? b : a;
                        const chatKey = getChatKey(currentUserData.username, other);
                        if (!unread[chatKey]) unread[chatKey] = 0;
                        unread[chatKey] = (unread[chatKey] || 0) + 1;
                        saveUnreadCounts(unread);
                        renderUserList();
                    }
                }
            }

            if (data.type === 'online_update') {
                if (data.user !== currentUserData.username) {
                    renderUserList();
                    renderChatHeader();
                }
            }

            if (data.type === 'avatar_update') {
                if (data.user !== currentUserData.username) {
                    renderUserList();
                    renderChatHeader();
                }
            }

            if (data.type === 'unread_update') {
                renderUserList();
            }
        }

        // ============================================================
        //  SEND MESSAGE
        // ============================================================

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !selectedChat || !currentUserData) return;

            // detect if it's just an emoji (single emoji)
            const isEmoji = /^[\u{1F000}-\u{1FFFF}]|[\u2600-\u27BF]|[\u{2700}-\u{27BF}]|[\u{FE00}-\u{FEFF}]|[\u{1F300}-\u{1F5FF}]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[\u{1F700}-\u{1F77F}]|[\u{1F780}-\u{1F7FF}]|[\u{1F800}-\u{1F8FF}]|[\u{1F900}-\u{1F9FF}]|[\u{1FA00}-\u{1FA6F}]|[\u{1FA70}-\u{1FAFF}]|[\u{1FB00}-\u{1FBFF}]|[\u{1FC00}-\u{1FCFF}]|[\u{1FD00}-\u{1FDFF}]|[\u{1FE00}-\u{1FEFF}]|[\u{1FF00}-\u{1FFFF}]/u.test(
                text) && text.length <= 2;

            addMessage(currentUserData.username, selectedChat, text, isEmoji);

            input.value = '';
            input.focus();
            // mark as read
            markAsRead(currentUserData.username, selectedChat);
            renderChat();
            renderUserList();
            renderChatHeader();

            // close emoji picker
            document.getElementById('emojiPicker').classList.remove('open');
        }

        // ============================================================
        //  INIT & EVENT BINDING
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {

            // ---- login ----
            const loginBtn = document.getElementById('loginBtn');
            const loginUser = document.getElementById('loginUsername');
            const loginPass = document.getElementById('loginPassword');
            const toggleAuth = document.getElementById('toggleAuth');
            let isLoginMode = true;

            loginBtn.addEventListener('click', () => {
                const user = loginUser.value.trim();
                const pass = loginPass.value.trim();
                if (isLoginMode) {
                    login(user, pass);
                } else {
                    register(user, pass);
                }
            });

            loginUser.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });
            loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });

            toggleAuth.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                toggleAuth.textContent = isLoginMode ?
                    'Нет аккаунта? Зарегистрироваться' :
                    'Уже есть аккаунт? Войти';
                loginBtn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
                document.getElementById('loginError').textContent = '';
            });

            // ---- logout ----
            document.getElementById('logoutBtn').addEventListener('click', logout);

            // ---- send ----
            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            // ---- emoji picker toggle ----
            document.getElementById('emojiBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                const picker = document.getElementById('emojiPicker');
                picker.classList.toggle('open');
            });

            document.addEventListener('click', () => {
                document.getElementById('emojiPicker').classList.remove('open');
            });

            document.getElementById('emojiPicker').addEventListener('click', (e) => {
                e.stopPropagation();
            });

            // ---- avatar modal ----
            document.getElementById('avatarBtn').addEventListener('click', () => {
                document.getElementById('avatarModal').classList.add('open');
                renderAvatarModal();
            });

            document.getElementById('avatarModalClose').addEventListener('click', () => {
                document.getElementById('avatarModal').classList.remove('open');
            });

            document.getElementById('avatarModal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    document.getElementById('avatarModal').classList.remove('open');
                }
            });

            // ---- auto-login for demo ----
            // Check if there's a saved session
            const saved = localStorage.getItem('ms_session');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.username && getUsers()[data.username]) {
                        login(data.username, getUsers()[data.username].password);
                    }
                } catch { /* ignore */ }
            }

            // Save session on login
            const origLogin = login;
            login = function(username, password) {
                const result = origLogin.call(this, username, password);
                if (result && currentUserData) {
                    localStorage.setItem('ms_session', JSON.stringify({ username: currentUserData.username }));
                }
                return result;
            };

            // Clear session on logout
            const origLogout = logout;
            logout = function() {
                localStorage.removeItem('ms_session');
                origLogout.call(this);
            };

            // Re-bind login/logout to use the new functions
            // Actually we already bound them, just patch the functions
            // Let's just override the click handler to use our new login
            // Better approach: replace the login function reference

            // Override the login function globally
            window.login = login;
            window.logout = logout;

            // Re-bind the login button
            loginBtn.onclick = () => {
                const user = loginUser.value.trim();
                const pass = loginPass.value.trim();
                if (isLoginMode) {
                    login(user, pass);
                } else {
                    register(user, pass);
                }
            };

            // Initial render of emoji picker
            renderEmojiPicker();

            console.log('🐻 Миша & Саша Соцсеть готова!');
        });

        // ============================================================
        //  FIX: handle broadcast for unread counts properly
        // ============================================================

        // Patch addMessage to also broadcast unread
        const origAddMessage = addMessage;
        addMessage = function(from, to, text, isEmoji) {
            const result = origAddMessage.call(this, from, to, text, isEmoji);
            // update unread for the recipient
            const chatKey = getChatKey(from, to);
            const unread = getUnreadCounts();
            // Only increment if the recipient is not the current user in this tab
            // and the chat is not currently open
            if (currentUserData && to === currentUserData.username) {
                // we're the recipient
                if (selectedChat !== from) {
                    if (!unread[chatKey]) unread[chatKey] = 0;
                    unread[chatKey] = (unread[chatKey] || 0) + 1;
                    saveUnreadCounts(unread);
                    broadcast({ type: 'unread_update', unread });
                }
            } else if (currentUserData && from === currentUserData.username) {
                // we sent the message, mark as read for ourselves
                markAsRead(from, to);
            }
            return result;
        };

        // Also patch markAsRead to broadcast
        const origMarkAsRead = markAsRead;
        markAsRead = function(user, other) {
            const result = origMarkAsRead.call(this, user, other);
            const unread = getUnreadCounts();
            broadcast({ type: 'unread_update', unread });
            return result;
        };

        console.log('✅ Все системы готовы!');
    </script>

</body>
